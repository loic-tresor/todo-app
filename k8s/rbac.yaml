apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-sa
  namespace: todo-app
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todo-role
  namespace: todo-app
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todo-binding
  namespace: todo-app
subjects:
- kind: ServiceAccount
  name: todo-sa
  namespace: todo-app
roleRef:
  kind: Role
  name: todo-role
  apiGroup: rbac.authorization.k8s.io
